name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - name: Prepare for GitHub Pages
        run: |
          # Copy dist files to root for GitHub Pages
          cp dist/index.html .
          mkdir -p assets
          cp -r dist/assets/* assets/
      - name: Commit changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add index.html assets/ dist/
          git commit -m "chore: build and deploy" || echo "No changes"
          git push
