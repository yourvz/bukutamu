<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Buku Tamu</title>
    <script>
      // SPA Redirect for Vue Router
      // For GitHub Pages, all 404s should redirect to index.html for SPA routing
      const path = window.location.pathname;

      // Only redirect if not accessing an asset file
      if (!path.includes(".") || path.endsWith("/")) {
        // Redirect 404 to index.html for Vue Router to handle
        window.location.href = "/bukutamu/";
      }
    </script>
  </head>
  <body>
    <p>Redirecting to application...</p>
  </body>
</html>
