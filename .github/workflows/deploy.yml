name: Deploy Next.js to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Deploy to gh-pages
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

          # Create temp directory for gh-pages content
          mkdir -p /tmp/gh-pages
          cp -r docs/* /tmp/gh-pages/
          cp .nojekyll /tmp/gh-pages/ || true

          # Checkout gh-pages branch
          git fetch origin gh-pages
          git checkout gh-pages

          # Clear old files and copy new ones
          find . -maxdepth 1 -type f -not -name '.git' -delete
          find . -maxdepth 1 -type d -not -name '.git' -exec rm -rf {} + 2>/dev/null || true
          cp -r /tmp/gh-pages/* .

          # Commit and push
          git add -A
          git commit -m "Deploy: Auto-generated build from main branch" || true
          git push origin gh-pages
