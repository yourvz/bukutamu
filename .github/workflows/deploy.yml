name: Build and Deploy

on:
  push:
    branches:
      - main
    paths-ignore:
      - ".github/**"
      - "404.html"

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
      - run: npm ci
      - run: npm run build

      - name: Prepare deployment files
        run: |
          # Copy dist files to root for GitHub Pages
          cp dist/index.html ./index_app.html
          mkdir -p assets
          cp -r dist/assets/* assets/ || true

      - name: Commit and push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add dist/ assets/ index_app.html
          git commit -m "chore: build and deploy" || echo "No changes"
